<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Busca de Produtos - Versão Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --glass-bg: rgba(255,255,255,0.1);
    --glass-strong: rgba(255,255,255,0.2);
    --text: #fff;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    margin: 0; padding: 20px;
    min-height: 100vh; color: var(--text);
    background: linear-gradient(-45deg, #1e3c72, #2a5298, #0f2027, #203a43, #2c5364);
    background-size: 400% 400%; animation: gradientBG 15s ease infinite;
  }
  @keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }
  @media (prefers-reduced-motion: reduce) {
    body { animation: none; }
    .spinner { animation: none; }
    .card { animation: none; }
  }

  h2 { text-align:center; font-weight:700; font-size:2rem; margin:0 0 10px; letter-spacing:1px; }
  h3 { text-align:center; font-weight:400; font-size:1rem; margin:0 0 20px; color: rgba(255,255,255,0.8); }

  .filtros {
    display:flex; flex-direction:column; gap:10px;
    background: var(--glass-bg); backdrop-filter: blur(10px);
    padding:20px; border-radius:15px; box-shadow: 0 4px 30px rgba(0,0,0,0.1);
    margin-bottom: 16px;
  }
  .linha { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  label { position:absolute; left:-9999px; }

  input, select {
    padding:10px 15px; border:none; border-radius:10px; outline:none;
    background: var(--glass-strong); color: var(--text); font-size:0.95rem;
    transition: all .3s ease; min-width: 180px;
  }
  input::placeholder { color: rgba(255,255,255,0.7); }
  input:focus, select:focus { background: rgba(255,255,255,0.3); box-shadow: 0 0 10px rgba(255,255,255,0.5); }
  select option { color:#000; background:#fff; }

  button {
    padding:10px 15px; background: var(--glass-strong); border:none; border-radius:12px;
    color:var(--text); font-weight:600; cursor:pointer;
    box-shadow: 4px 4px 8px rgba(0,0,0,0.4), -4px -4px 8px rgba(255,255,255,0.1);
    transition: all .3s ease; display:flex; align-items:center; gap:6px;
  }
  button:hover { transform: translateY(-2px); box-shadow: 6px 6px 12px rgba(0,0,0,0.5), -6px -6px 12px rgba(255,255,255,0.15); background: rgba(255,255,255,0.3); }
  button.ativo { background: rgba(77,255,136,0.3); border: 1px solid #4dff88; }

  .resumo { text-align:center; margin-bottom: 10px; color: rgba(255,255,255,0.85); }

  .cards { display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:20px; }
  .card {
    background: var(--glass-bg); backdrop-filter: blur(12px);
    border-radius:15px; padding:20px; box-shadow: 0 4px 30px rgba(0,0,0,0.1);
    transition: all .3s ease; animation: fadeIn .5s ease forwards;
  }
  .card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
  @keyframes fadeIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }

  .card-header { font-size:1.05rem; font-weight:600; margin-bottom:12px; color:#fff; }
  .metrics { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:12px; }
  .metric { background: rgba(255,255,255,0.15); padding:8px; border-radius:8px; text-align:center; font-size:0.85rem; color:#fff; }
  .metric span { display:block; font-weight:700; font-size:1rem; }
  .details { font-size:0.85rem; color: rgba(255,255,255,0.85); display:flex; flex-wrap:wrap; gap:6px; }
  .tag { background: rgba(255,255,255,0.15); padding:4px 8px; border-radius:6px; }

  .alert { color:#ff4d4d; }
  .ok { color:#4dff88; }
  .info { color:#4da6ff; }
  .muted { color: rgba(255,255,255,0.7); }

  .spinner { border:3px solid rgba(255,255,255,0.3); border-top:3px solid #fff; border-radius:50%; width:18px; height:18px; animation: spin 0.8s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);} }
</style>
</head>

        "DescricaoProduto": "ZE DELIVERY SACOLA PLAST AMARELA 1 UN SAC 8G 37X48 SACO PL C1000",
        "FamliaEmbalagem": "SACO PLAST 8G",
        "Embalagem": "1 UN SAC 8G 37X48 SACO PL C1000",
        "Categoria": "MKTP",
        "Subcategoria": "TRADE MATERIALS",
        "CategoriaPPMS": "Zé Delivery",
        "ClusterDemanda": "MARKET PLACE",
        "UnidadeMedida": "Caixa",
        "CXS": 3,
        "PLT": 0,
        "Transito": 0,
        "MarcMarcD0": 0,
        "MarcMarcD1": 0,
        "MarcMarcD2": 0
    },
    {
        "CodigoProduto": 36773,
        "DescricaoProduto": "ZE DELIVERY SACOLA PLAST AMARELA 1 UN SAC 13,8G 50X60 SACO PL C500",
        "FamliaEmbalagem": "SACO PLAST 13,8G",
        "Embalagem": "1 UN SAC 13,8G 50X60 SACO PL C500",
        "Categoria": "MKTP",
        "Subcategoria": "TRADE MATERIALS",
        "CategoriaPPMS": "Zé Delivery",
        "ClusterDemanda": "MARKET PLACE",
        "UnidadeMedida": "Caixa",
        "CXS": 8,
        "PLT": 0,
        "Transito": 0,
        "MarcMarcD0": 0,
        "MarcMarcD1": 0,
        "MarcMarcD2": 0
    }
];

  // --- Estado ---
  let filtroExtraCampo = null; // 'Transito' | 'MarcMarcD0' | 'MarcMarcD1' | 'MarcMarcD2' | null

  // --- Utilidades ---
  const nf = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
  function paraNumero(valor) {
    if (valor === null || valor === undefined) return 0;
    if (typeof valor === 'number') return Number.isFinite(valor) ? valor : 0;
    const limpo = String(valor).replace(/\./g, '').replace(',', '.').trim();
    const n = parseFloat(limpo);
    return Number.isFinite(n) ? n : 0;
  }
  function formata(valor) { return nf.format(paraNumero(valor)); }
  function normalizaTexto(s) { return String(s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase(); }

  // --- DOM refs ---
  const $codigo = document.getElementById('codigoInput');
  const $nome = document.getElementById('nomeInput');
  const $categoria = document.getElementById('categoriaSelect');
  const $cluster = document.getElementById('clusterSelect');
  const $resumo = document.getElementById('resumo');
  const $resultado = document.getElementById('resultado');

  // --- Interações ---
  document.getElementById('btnBuscar').addEventListener('click', buscarProduto);
  document.getElementById('btnLimpar').addEventListener('click', limparCampos);
  $codigo.addEventListener('keydown', e => { if (e.key === 'Enter') buscarProduto(); });
  $nome.addEventListener('keydown', e => { if (e.key === 'Enter') buscarProduto(); });

  // Toggle dos botões extra
  document.querySelectorAll('[data-extra]').forEach(btn => {
    btn.addEventListener('click', () => {
      const campo = btn.dataset.extra;
      // Se já está ativo, desativa; senão ativa
      if (filtroExtraCampo === campo) {
        filtroExtraCampo = null;
        btn.classList.remove('ativo');
      } else {
        filtroExtraCampo = campo;
        document.querySelectorAll('[data-extra]').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
      }
      buscarProduto();
    });
  });

  function mostrarLoading() {
    $resultado.innerHTML = `
      <div style="display:flex;justify-content:center;align-items:center;height:100px;">
        <div class="spinner" aria-label="Carregando"></div>
      </div>
    `;
  }

  function atualizarResumo(qtd) {
    const filtros = [];
    if ($codigo.value.trim()) filtros.push(`Código: ${$codigo.value.trim()}`);
    if ($nome.value.trim()) filtros.push(`Nome: "${$nome.value.trim()}"`);
    if ($categoria.value) filtros.push(`Categoria: ${$categoria.value}`);
    if ($cluster.value) filtros.push(`Cluster: ${$cluster.value}`);
    if (filtroExtraCampo) filtros.push(`Extra: ${filtroExtraCampo}`);
    $resumo.textContent = `${qtd} item(ns) encontrado(s)` + (filtros.length ? ` • Filtros: ${filtros.join(' | ')}` : '');
  }

  function buscarProduto() {
    mostrarLoading();
    setTimeout(() => {
      const codigo = $codigo.value.trim();
      const nome = normalizaTexto($nome.value.trim());
      const categoria = $categoria.value;
      const cluster = $cluster.value;

      const resultados = produtos.filter(p => {
        const condCodigo = !codigo || String(p.CodigoProduto).includes(codigo);
        const condNome = !nome || normalizaTexto(p.DescricaoProduto).includes(nome);
        const condCategoria = !categoria || p.Categoria === categoria;
        const condCluster = !cluster || p.ClusterDemanda === cluster;
        const condExtra = !filtroExtraCampo || paraNumero(p[filtroExtraCampo]) > 0;
        return condCodigo && condNome && condCategoria && condCluster && condExtra;
      });

      exibirResultados(resultados);
      atualizarResumo(resultados.length);
    }, 300);
  }

  function exibirResultados(resultados) {
    $resultado.innerHTML = '';
    if (!resultados.length) {
      const p = document.createElement('p');
      p.style.color = '#ff4d4d';
      p.textContent = 'Nenhum produto encontrado.';
      $resultado.appendChild(p);
      return;
    }

    const frag = document.createDocumentFragment();

    resultados.forEach(produto => {
      const card = document.createElement('div');
      card.className = 'card';

      const cxsVal = paraNumero(produto.CXS);
      const pltVal = paraNumero(produto.PLT);
      const transVal = paraNumero(produto.Transito);

      const cxsClass = cxsVal === 0 ? 'alert' : 'ok';
      const pltClass = pltVal > 10 ? 'ok' : 'info';
      const transClass = transVal > 0 ? 'info' : 'muted';

      // Header
      const header = document.createElement('div');
      header.className = 'card-header';
      header.textContent = `${produto.CodigoProduto} - ${produto.DescricaoProduto}`;

      // Métricas
      const metrics = document.createElement('div');
      metrics.className = 'metrics';

      metrics.appendChild(metrica(formata(produto.CXS), '📦 CXS', cxsClass));
      metrics.appendChild(metrica(formata(produto.PLT), '🛒 PLT', pltClass));
      metrics.appendChild(metrica(formata(produto.Transito), '🚚 Trânsito', transClass));
      metrics.appendChild(metrica(formata(produto.MarcMarcD0), '⏱️ D0', ''));
      metrics.appendChild(metrica(formata(produto.MarcMarcD1), '📦 D1', ''));
      metrics.appendChild(metrica(formata(produto.MarcMarcD2), '📦 D2', ''));

      // Detalhes
      const details = document.createElement('div');
      details.className = 'details';
      details.appendChild(tag(`Família: ${produto.FamiliaEmbalagem ?? '—'}`));
      details.appendChild(tag(`Embalagem: ${produto.Embalagem ?? '—'}`));
      details.appendChild(tag(`Categoria: ${produto.Categoria ?? '—'}`));
      details.appendChild(tag(`Subcategoria: ${produto.Subcategoria ?? '—'}`));
      details.appendChild(tag(`CategoriaPPMS: ${produto.CategoriaPPMS ?? '—'}`));
      details.appendChild(tag(`ClusterDemanda: ${produto.ClusterDemanda ?? '—'}`));
      details.appendChild(tag(`Unidade: ${produto.UnidadeMedida ?? '—'}`));

      card.appendChild(header);
      card.appendChild(metrics);
      card.appendChild(details);
      frag.appendChild(card);
    });

    $resultado.appendChild(frag);

    function metrica(valor, label, extraClass) {
      const d = document.createElement('div');
      d.className = `metric ${extraClass || ''}`.trim();
      const span = document.createElement('span');
      span.textContent = valor;
      d.appendChild(span);
      d.appendChild(document.createTextNode(` ${label}`));
      return d;
    }
    function tag(texto) {
      const d = document.createElement('div');
      d.className = 'tag';
      d.textContent = texto;
      return d;
    }
  }

  function limparCampos() {
    $codigo.value = '';
    $nome.value = '';
    $categoria.value = '';
    $cluster.value = '';
    filtroExtraCampo = null;
    document.querySelectorAll('[data-extra]').forEach(b => b.classList.remove('ativo'));
    $resultado.innerHTML = '';
    $resumo.textContent = '';
    $codigo.focus();
  }

  // Busca inicial opcional
  // buscarProduto();
</script>

</body>
