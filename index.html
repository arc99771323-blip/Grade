<head>
<meta charset="UTF-8">
<title>Consulta de Produtos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg-gradient: radial-gradient(circle at top left, #1a253a, #0a0a0d);
    --glass-bg: rgba(17, 25, 40, 0.6);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-primary: #ffffff;
    --text-secondary: rgba(255, 255, 255, 0.6);
    --accent: #00ff88;
    --alert: #ff4d4d;
    --info: #38bdf8;
  }

  * { box-sizing: border-box; outline: none; }

  body {
    font-family: 'Inter', sans-serif;
    margin: 0; padding: 15px; /* Reduzi o respiro lateral */
    min-height: 100vh; color: var(--text-primary);
    background: var(--bg-gradient);
    background-attachment: fixed;
  }

  /* Cabeçalho mais contido */
  h2 { text-align: center; font-weight: 700; font-size: 1.6rem; margin: 0 0 4px; letter-spacing: -1px; }
  h3 { text-align: center; font-weight: 400; font-size: 0.75rem; margin: 0 0 20px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Filtros - Mais densos */
  .filtros {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 15px 20px; /* Reduzi o padding de 30px para 15px */
    border-radius: 16px;
    border: 1px solid var(--glass-border);
    margin-bottom: 20px;
  }

  .linha { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 8px; }
  .linha:last-child { margin-bottom: 0; }

  /* Inputs e Selects Menores */
  input, select {
    padding: 8px 12px; border: 1px solid var(--glass-border); border-radius: 10px;
    background: rgba(0, 0, 0, 0.3); color: var(--text-primary); font-size: 0.85rem;
    transition: all .3s ease; min-width: 160px;
  }
  input:focus, select:focus { border-color: var(--info); background: rgba(0,0,0,0.5); }
  select option { color: #000; background: #fff; }

  /* Botões Compactos */
  button {
    padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px;
    color: var(--text-primary); font-weight: 600; font-size: 0.8rem; cursor: pointer; 
    transition: all .2s ease;
    display: flex; align-items: center; gap: 6px; position: relative;
  }
  button:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
  
  #btnBuscar { background: rgba(56, 189, 248, 0.15); border-color: rgba(56, 189, 248, 0.3); color: var(--info); }

  button.ativo { border-color: var(--accent); background: rgba(0, 255, 136, 0.1); color: var(--accent); }
  button.ativo::after { content: ''; position: absolute; bottom: -1px; left: 25%; width: 50%; height: 2px; background: var(--accent); }

  button i.lucide { width: 14px; height: 14px; stroke-width: 2.5px; }

  .resumo { text-align: center; margin-bottom: 15px; font-size: 0.8rem; color: var(--info); font-weight: 500; }

  /* Grade de Cards mais apertada para caber mais itens */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 15px; }
  
  .card {
    background: var(--glass-bg); backdrop-filter: blur(15px);
    border-radius: 16px; padding: 16px; border: 1px solid var(--glass-border);
    transition: all .3s ease; 
  }
  .card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }

  .card-header { font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; line-height: 1.3; color: #fff; display: flex; gap: 8px;}
  .card-header i.lucide-package { width: 16px; height: 16px; color: var(--text-secondary); margin-top: 2px; flex-shrink: 0;}

  /* Metrics menores */
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .metric { 
    background: rgba(0, 0, 0, 0.4); padding: 8px 4px; border-radius: 10px; 
    text-align: center; font-size: 0.65rem; color: var(--text-secondary);
    border: 1px solid rgba(255,255,255,0.03);
  }
  .metric span { display: block; font-weight: 700; font-size: 1rem; margin-bottom: 0px; color: #fff; }

  /* Glows discretos */
  .metric.ok span { color: var(--accent); text-shadow: 0 0 8px rgba(0, 255, 136, 0.2); }
  .metric.alert span { color: var(--alert); text-shadow: 0 0 8px rgba(255, 77, 77, 0.2); }
  .metric.info span { color: var(--info); text-shadow: 0 0 8px rgba(56, 189, 248, 0.2); }

  .details { display: flex; flex-wrap: wrap; gap: 6px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; }
  .tag { 
    background: rgba(255, 255, 255, 0.04); padding: 3px 8px; border-radius: 6px; 
    font-size: 0.65rem; color: var(--text-secondary); font-weight: 500;
  }

  .spinner { border: 2px solid rgba(255,255,255,0.05); border-top-color: var(--info); border-radius: 50%; width: 25px; height: 25px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  label { position: absolute; left: -9999px; }
</style>
</head>

  let filtroExtraCampo = null;
  const nf = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  
  function paraNumero(valor) {
    if (valor === null || valor === undefined) return 0;
    if (typeof valor === 'number') {
      if (!Number.isInteger(valor)) return Math.round(valor * 1000);
      return valor;
    }
    const limpo = String(valor).replace(/\./g, '').replace(',', '.').trim();
    const n = parseFloat(limpo);
    return isNaN(n) ? 0 : Math.round(n);
  }

  function formata(valor) { return nf.format(paraNumero(valor)); }
  function normalizaTexto(s) { return String(s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase(); }

  const $codigo = document.getElementById('codigoInput');
  const $nome = document.getElementById('nomeInput');
  const $categoria = document.getElementById('categoriaSelect');
  const $cluster = document.getElementById('clusterSelect');
  const $resumo = document.getElementById('resumo');
  const $resultado = document.getElementById('resultado');

  $codigo.addEventListener('input', () => {
    const val = $codigo.value.trim();
    if (val === "" || produtos.some(p => String(p.CodigoProduto) === val)) buscarProduto();
  });

  document.getElementById('btnBuscar').addEventListener('click', buscarProduto);
  document.getElementById('btnLimpar').addEventListener('click', limparCampos);
  $nome.addEventListener('keydown', e => e.key === 'Enter' && buscarProduto());

  document.querySelectorAll('[data-extra]').forEach(btn => {
    btn.addEventListener('click', () => {
      filtroExtraCampo = (filtroExtraCampo === btn.dataset.extra) ? null : btn.dataset.extra;
      document.querySelectorAll('[data-extra]').forEach(b => b.classList.toggle('ativo', b.dataset.extra === filtroExtraCampo));
      buscarProduto();
    });
  });

  function gerarCardHTML(p) {
    const cxs = paraNumero(p.CXS);
    const plt = paraNumero(p.PLT);
    const tra = paraNumero(p.Transito);
    const getStatus = (v, type) => {
      if (type === 'CXS') return v === 0 ? 'alert' : 'ok';
      if (type === 'PLT') return v > 10 ? 'ok' : 'info';
      if (type === 'TRA') return v > 0 ? 'info' : '';
      if (type === 'DIA') return v > 0 ? 'ok' : '';
      return '';
    };

    return `
      <div class="card">
        <div class="card-header">
            <i data-lucide="package"></i>
            <div>${p.CodigoProduto} • ${p.DescricaoProduto}</div>
        </div>
        <div class="metrics">
          <div class="metric ${getStatus(plt, 'PLT')}"><span>${formata(p.PLT)}</span> Paletes</div>
          <div class="metric ${getStatus(cxs, 'CXS')}"><span>${formata(p.CXS)}</span> Caixas</div>
          <div class="metric ${getStatus(tra, 'TRA')}"><span>${formata(p.Transito)}</span> Em trânsito</div>
          <div class="metric ${getStatus(p.MarcMarcD0, 'DIA')}"><span>${formata(p.MarcMarcD0)}</span> Marc. D0</div>
          <div class="metric ${getStatus(p.MarcMarcD1, 'DIA')}"><span>${formata(p.MarcMarcD1)}</span> Marc. D1</div>
          <div class="metric ${getStatus(p.MarcMarcD2, 'DIA')}"><span>${formata(p.MarcMarcD2)}</span> Marc. D2</div>
        </div>
        <div class="details">
          <div class="tag">${p.FamliaEmbalagem ?? '—'}</div>
          <div class="tag">${p.Categoria ?? '—'}</div>
          <div class="tag">${p.ClusterDemanda ?? '—'}</div>
        </div>
      </div>
    `;
  }

  function buscarProduto() {
    $resultado.innerHTML = '<div style="grid-column:1/-1; display:flex; justify-content:center; padding:20px;"><div class="spinner"></div></div>';
    setTimeout(() => {
      const cod = $codigo.value.trim();
      const nom = normalizaTexto($nome.value.trim());
      const cat = $categoria.value;
      const clu = $cluster.value;

      const res = produtos.filter(p => {
        const matchCodigo = !cod || String(p.CodigoProduto) === cod;
        const matchNome = !nom || normalizaTexto(p.DescricaoProduto).includes(nom);
        const matchCat = !cat || p.Categoria === cat;
        const matchClu = !clu || p.ClusterDemanda === clu;
        const matchExtra = !filtroExtraCampo || paraNumero(p[filtroExtraCampo]) > 0;
        return matchCodigo && matchNome && matchCat && matchClu && matchExtra;
      });

      $resultado.innerHTML = res.length ? res.map(gerarCardHTML).join('') : '<p style="grid-column:1/-1; text-align:center; color:var(--alert); font-size: 0.8rem;">Nenhum item encontrado.</p>';
      lucide.createIcons();
      $resumo.textContent = `${res.length} item(ns) encontrado(s)`;
    }, 150);
  }

  function limparCampos() {
    $codigo.value = ''; $nome.value = ''; $categoria.value = ''; $cluster.value = '';
    filtroExtraCampo = null;
    document.querySelectorAll('[data-extra]').forEach(b => b.classList.remove('ativo'));
    $resultado.innerHTML = ''; $resumo.textContent = ''; $codigo.focus();
  }
</script>
